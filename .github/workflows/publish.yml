# ─────────────────────────────────────────────────────────────────────────────
# Publish observal-cli to PyPI using Trusted Publishers (OIDC).
#
# Triggers on GitHub Releases (tag pattern: v*).
#
# Setup (one-time):
#   IMPORTANT: A "pending publisher" does NOT reserve a project name on PyPI.
#   The project name is only reserved once the project is actually created.
#   Recommended order:
#   1. Create the project first (initial publish by a maintainer account).
#   2. Go to https://pypi.org/manage/account/publishing/
#   3. Add a new "pending publisher" with:
#        PyPI Project Name:  observal-cli
#        Owner:              RJohnPaul
#        Repository name:    Observal
#        Workflow name:      publish.yml
#        Environment name:   pypi
#   4. In GitHub repo Settings → Environments, create an environment
#      named "pypi" with protection rules (optional but recommended).
# ─────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build the package ────────────────────────────────────────────────────
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build package
        run: uv build --sdist --wheel

      - name: Verify wheel contents
        run: |
          python3 -m zipfile -l dist/*.whl
          echo "---"
          echo "Files in wheel:"
          python3 -m zipfile -l dist/*.whl | wc -l

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── Run tests before publishing ──────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run tests
        run: |
          cd observal-server
          uv run \
            --python ${{ matrix.python-version }} \
            --with pytest \
            --with pytest-asyncio \
            --with pyyaml \
            --with typer \
            --with rich \
            --with docker \
            pytest ../tests/ -q

  # ── Publish to PyPI via Trusted Publishers ────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
