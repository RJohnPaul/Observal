services:
  observal-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    depends_on:
      observal-db:
        condition: service_healthy
      observal-clickhouse:
        condition: service_started
    networks:
      - observal-net

  observal-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://observal-api:8000
    depends_on:
      - observal-api
    networks:
      - observal-net

  observal-db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: observal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - observal-net

  observal-clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_DB: observal
    volumes:
      - chdata:/var/lib/clickhouse
    networks:
      - observal-net

volumes:
  pgdata:
  chdata:

networks:
  observal-net:
    driver: bridge
